name: Type Check & Test

on:
  push:
    branches: [ develop, feat/type*, build/* ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * 0'

defaults:
  run:
    shell: bash -ieol pipefail {0}

concurrency:
  group: typecheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type_check:
    name: apps/mobile typecheck
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
    runs-on:
      - ubuntu-latest
    # runs-on:
    #   - self-hosted
    #   - macOS
    #   - mobile
    env:
      NODE_OPTIONS: '--max_old_space_size=4096'
      YARN_ENABLE_HARDENED_MODE: '0'

    steps:
      - name: Checkout git repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Type Check
        run: time yarn workspace rabby-mobile typecheck

  mobile_jest:
    name: apps/mobile jest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
    runs-on:
      - ubuntu-latest
    env:
      NODE_OPTIONS: '--max_old_space_size=4096'
      YARN_ENABLE_HARDENED_MODE: '0'

    steps:
      - name: Checkout git repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run apps/mobile Jest
        run: time yarn workspace rabby-mobile test --runInBand
