name: Hash Validate RN App

on:
  push:
    tags:
      - 'hashcheck-*'
    branches:
      - publish/*
  workflow_dispatch:

jobs:
  # --- Job 1: 构建 Android ---
  build-android:
    name: Build Android & Generate Hash
    runs-on: macos-latest
    outputs:
      android_hash: ${{ steps.generate_hash.outputs.hash }}
    env:
      NODE_OPTIONS: '--max_old_space_size=8192'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 'Setup Nodejs and Yarn'
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 'Setup Ruby & Fastlane'
        uses: heisenberg-2077/setup-ruby@master
        with:
          ruby-version: '2.7.4'

      - name: 'Setup Java'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '17'

      - name: 'Setup Android SDK'
        uses: android-actions/setup-android@v3

      - name: Validate Android App
        id: generate_hash
        run: |
          cd apps/mobile
          ./scripts/validate-hash/run.sh android
          EXPORT_DIR=$(find . -maxdepth 1 -type d -name 'validation_exports_*' | LC_ALL=C sort | tail -n 1)
          if [ -z "$EXPORT_DIR" ] || [ ! -f "$EXPORT_DIR/android/build_hashes_android.json" ]; then
            echo "Failed to find Android hash report"
            exit 1
          fi
          GENERATED_HASH=$(node -e 'const fs=require("fs"); const report=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(report.hash);' "$EXPORT_DIR/android/build_hashes_android.json")
          echo "hash=${GENERATED_HASH}" >> $GITHUB_OUTPUT
        env:
          RABBY_MOBILE_KR_PWD: ${{ secrets.RABBY_MOBILE_KR_PWD }}
          RABBY_MOBILE_SAFE_API_KEY: ${{ secrets.MOBILE_SAFE_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          path: apps/mobile/validation_exports_*
          name: android-build
          retention-days: 1

      - name: Clean logs
        run: |
          rm -rf apps/mobile/validation_exports_*

  # --- Job 2: 构建 iOS ---
  build-ios:
    name: Build iOS & Generate Hash
    runs-on: macos-26
    env:
      NODE_OPTIONS: '--max_old_space_size=8192'
      XCODE_VER: '26.3'

    outputs:
      ios_hash: ${{ steps.generate_hash.outputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: '[macOS] Setup Xcode'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VER }}

      - name: 'Setup Nodejs and Yarn'
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 'Setup Ruby & Fastlane'
        uses: heisenberg-2077/setup-ruby@master
        with:
          ruby-version: '2.7.4'

      - name: Validate iOS App
        id: generate_hash
        run: |
          # test sorting consistency across platforms by using a fixed set of inputs
          echo "Testing sort consistency across platforms..."
          printf 'Z\0a\0A\0z\0' | LC_ALL=C LC_COLLATE=C sort -z | xargs -0
          echo "Testing sort consistency with default locale..."
          printf 'Z\0a\0A\0z\0' | sort -z | xargs -0
          cd apps/mobile
          ./scripts/validate-hash/run.sh ios
          EXPORT_DIR=$(find . -maxdepth 1 -type d -name 'validation_exports_*' | LC_ALL=C sort | tail -n 1)
          if [ -z "$EXPORT_DIR" ] || [ ! -f "$EXPORT_DIR/ios/build_hashes_ios.json" ]; then
            echo "Failed to find iOS hash report"
            exit 1
          fi
          GENERATED_HASH=$(node -e 'const fs=require("fs"); const report=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(report.hash);' "$EXPORT_DIR/ios/build_hashes_ios.json")
          echo "hash=${GENERATED_HASH}" >> $GITHUB_OUTPUT
        env:
          RABBY_MOBILE_KR_PWD: ${{ secrets.RABBY_MOBILE_KR_PWD }}
          RABBY_MOBILE_SAFE_API_KEY: ${{ secrets.MOBILE_SAFE_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          path: apps/mobile/validation_exports_*
          name: ios-build
          retention-days: 1

      - name: Clean logs
        run: |
          rm -rf apps/mobile/validation_exports_*

  # --- Job 3: 结合 Hash ---
  combine-hashes:
    name: Combine Hashes
    needs: [build-android, build-ios]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 'Setup Nodejs and Yarn'
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Get Hashes from previous jobs
        run: |
          echo "Android Hash: ${{ needs.build-android.outputs.android_hash }}"
          echo "iOS Hash: ${{ needs.build-ios.outputs.ios_hash }}"

      - name: Generate Final Hash
        env:
          # see more details on https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
          GIT_ACTIONS_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GIT_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_REF_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}
          RABBY_MOBILE_LARK_CHAT_URL: ${{ secrets.LARK_CHAT_URL }}
          RABBY_MOBILE_LARK_CHAT_SECRET: ${{ secrets.LARK_CHAT_SECRET }}
          RABBY_ROBOT_LARK_APP_ID: ${{ secrets.RABBY_ROBOT_LARK_APP_ID }}
          RABBY_ROBOT_LARK_APP_SECRET: ${{ secrets.RABBY_ROBOT_LARK_APP_SECRET }}

        run: |
          YARN_PATH=$(sed -n 's/^yarnPath:[[:space:]]*//p' .yarnrc.yml | head -n 1)
          node "$YARN_PATH" install --immutable

          cd apps/mobile

          HASH_A="${{ needs.build-android.outputs.android_hash }}"
          HASH_I="${{ needs.build-ios.outputs.ios_hash }}"

          if [ -z "$HASH_A" ] || [ -z "$HASH_I" ]; then
            echo "Error: One of the required hashes is missing."

            node ./scripts/validate-hash/notify-lark.js "$HASH_A" "$HASH_I"
            exit 1
          fi

          FINAL_HASH=$(printf "%s\n%s" "$HASH_I" "$HASH_A" | sort | shasum -a 256 | awk '{print $1}')

          node ./scripts/validate-hash/notify-lark.js "$HASH_A" "$HASH_I" "$FINAL_HASH"

          echo "Final Combined Hash: ${FINAL_HASH}"
