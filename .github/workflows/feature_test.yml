name: Feature Test

on:
  workflow_dispatch:
    inputs:
      REALLY_UPLOAD:
        required: true
        type: boolean
        default: true
      SENTRY_DISABLE_AUTO_UPLOAD:
        required: false
        type: boolean
        default: false
      FAST_BUILD_ON_ANDROID:
        required: false
        type: boolean
        default: false
      FAST_BUILD_ON_IOS:
        required: false
        type: boolean
        default: false
      SKIP_NOTIFY_LARK:
        required: false
        type: boolean
        default: false
      macos_machine_location:
        required: true
        type: choice
        options:
          - 'mobile'
          - 'mobile-local'
        default: 'mobile'
      RABBY_MOBILE_NM_USE_CACHE:
        required: false
        type: boolean
        default: true
      RABBY_MOBILE_POD_USE_CACHE:
        required: false
        type: boolean
        default: false
      RABBY_MOBILE_GRADLE_USE_CACHE:
        required: false
        type: boolean
        default: true
      __DANGEROUS_NO_VERIFY_SSL:
        required: false
        type: boolean
        default: false
      __SKIP_BUILD:
        required: false
        type: boolean
        default: false
      GHA_MOCK_BUILD_FAILED:
        required: false
        type: boolean
        default: false
      NEW_VERSION_NAME:
        required: false
        type: string
        default: ''

defaults:
  run:
    shell: bash -ieol pipefail {0}

jobs:
  setup:
    name: Build
    strategy:
      matrix:
        include:
          - host: macOS
            machine_loc: ${{ inputs.macos_machine_location }}
          - host: Linux
            machine_loc: mobile
    runs-on:
      - self-hosted
      - ${{ matrix.host }}
      - ${{ matrix.machine_loc }}
    env:
      NODE_OPTIONS: '--max_old_space_size=12288'
      RABBY_MOBILE_POD_USE_CACHE: ${{ inputs.RABBY_MOBILE_POD_USE_CACHE }}
      RABBY_MOBILE_GRADLE_USE_CACHE: ${{ inputs.RABBY_MOBILE_GRADLE_USE_CACHE }}
      RABBY_MOBILE_IOS_FAST_BUILD: ${{ inputs.FAST_BUILD_ON_IOS }}
      SKIP_BUILD: ${{ inputs.__SKIP_BUILD }}
      RABBY_MOBILE_NM_USE_CACHE: ${{ inputs.RABBY_MOBILE_NM_USE_CACHE }}
      XCODE_VER: '26.3'
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v3
        with:
          clean: false

      - name: Clean git Manually
        run: |
          OS_TYPE=$(uname -s);
          echo "OS_TYPE is $OS_TYPE";
          yarn_exclude_args=()
          if [ "$RABBY_MOBILE_NM_USE_CACHE" = "true" ]; then
            echo "Keep yarn install outputs";
            yarn_exclude_args+=(
              -e node_modules
              -e 'apps/*/node_modules'
              -e 'packages/*/node_modules'
              -e .yarn/install-state.gz
              -e .yarn/unplugged
            )
          fi

          if [ "$OS_TYPE" == "Linux" ]; then
            if [ "$RABBY_MOBILE_GRADLE_USE_CACHE" = "true" ]; then
              echo "Keep gradle cache";
              git clean -ffdx "${yarn_exclude_args[@]}" \
                -e .turbo-build \
                -e apps/mobile/.turbo-build \
                -e apps/mobile/assets/android/builtin-pages \
                -e apps/mobile/android/app/src/main/assets/custom \
                -e apps/mobile/android/app/src/main/assets/fonts \
                -e apps/mobile/android/app/src/main/assets/threads \
                -e apps/mobile/android/.gradle \
                -e apps/mobile/android/app/build;
              rm -rf apps/mobile/android/app/build/outputs;
            else
              echo "Clean gradle cache";
              git clean -ffdx "${yarn_exclude_args[@]}";
            fi
          elif [ "$OS_TYPE" == "Darwin" ]; then
            if [ "$RABBY_MOBILE_IOS_FAST_BUILD" = "true" ]; then
              echo "Keep iOS fast-build template cache";
              ios_fast_build_exclude_args=(
                -e apps/mobile/scripts/.fast-build-work/template.xcarchive
                -e apps/mobile/scripts/.fast-build-work/template-ios.template-shell-hash
              )
            else
              ios_fast_build_exclude_args=()
            fi

            if [ "$RABBY_MOBILE_POD_USE_CACHE" = "true" ]; then
              echo "Keep cocoapods cache";
              git clean -ffdx "${yarn_exclude_args[@]}" \
                -e .turbo-build \
                -e apps/mobile/.turbo-build \
                "${ios_fast_build_exclude_args[@]}" \
                -e apps/mobile/assets/ios/builtin-pages \
                -e apps/mobile/assets/ios/threads \
                -e apps/mobile/ios/RabbyMobile/Resources \
                -e apps/mobile/ios/Pods \
                -e apps/mobile/ios/build;
            else
              echo "Clean cocoapods cache";
              git clean -ffdx "${yarn_exclude_args[@]}" "${ios_fast_build_exclude_args[@]}";
            fi
          fi
          git reset --hard HEAD;

      - name: Env Test
        id: env-test
        run: |
          echo "whoami $(whoami)"
          echo "shell is $(echo $0)"
          echo "HOME is $HOME"
          echo "which node $(which node)"

      - name: '[Linux] Setup Nodejs and Yarn'
        if: runner.os == 'Linux'
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: '[Linux] Setup Ruby & Fastlane'
        if: runner.os == 'Linux'
        uses: heisenberg-2077/setup-ruby@master
        with:
          ruby-version: '2.7.2'
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: '[Linux] Setup Java'
        if: runner.os == 'Linux'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '17'

      - name: '[Linux] Setup Android SDK'
        if: runner.os == 'Linux'
        uses: android-actions/setup-android@v3
        with:
          # https://github.com/android-actions/setup-android?tab=readme-ov-file#sdk-version-selection
          # use 16.0
          cmdline-tools-version: 12266719

      # - name: '[Linux] Cache Gradle'
      #   if: runner.os == 'Linux'
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.gradle/caches
      #       ~/.gradle/wrapper
      #       ${{ env.WORKING_DIRECTORY }}/apps/mobile/android/build
      #       ${{ env.WORKING_DIRECTORY }}/apps/mobile/android/.gradle
      #     key: ${{ runner.os }}-kotlin-lint-gradle-${{ hashFiles('${{ env.WORKING_DIRECTORY }}/**/*.gradle*', '${{ env.WORKING_DIRECTORY }}/**/gradle-wrapper.properties', '${{ env.WORKING_DIRECTORY }}/apps/mobile/android/build.gradle') }}

      - name: '[macOS] Setup Xcode'
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        id: setup-xcode
        with:
          # use specific version rather than 'latest-stable' if multiple Xcodes installed
          xcode-version: ${{ env.XCODE_VER }}

      - name: Install and build
        run: |
          echo "REALLY_UPLOAD value: $REALLY_UPLOAD";
          cd apps/mobile;
          nvm use;
          yarn install --immutable;
          if ! bundle check >/dev/null 2>&1; then
            bundle install;
          else
            echo "Ruby bundle already satisfied";
          fi

          if [ -n "$INPUT_NEW_VERSION_NAME" ]; then
            echo "Apply requested app version: $INPUT_NEW_VERSION_NAME";
            node --eval "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = process.env.INPUT_NEW_VERSION_NAME;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            ";
            yarn syncrnversion;
          fi

          OS_TYPE=$(uname -s);
          echo "OS_TYPE is $OS_TYPE";

          if [ "$OS_TYPE" == "Linux" ]; then
            export RABBY_MOBILE_TURBO_BUILD=false
            if [ "$RABBY_MOBILE_GRADLE_USE_CACHE" = "true" ]; then
              echo "Enable Gradle cache for Linux regression package"
            fi
            buildchannel=selfhost-reg ./scripts/deploy-android.sh
          elif [ "$OS_TYPE" == "Darwin" ]; then
            export RABBY_MOBILE_TURBO_BUILD=false
            if [ "$RABBY_MOBILE_POD_USE_CACHE" = "true" ]; then
              echo "Enable pod cache for iOS regression package"
            fi
            if [ "$INPUT_MOBILE_LOC" == "mobile-local" ]; then
              export SENTRY_DISABLE_AUTO_UPLOAD=true
              export NODE_OPTIONS="--max_old_space_size=20480"
            else
              RABBY_MOBILE_UNLOCK_KEYCHAIN_PASS=${{ secrets.KEYCHAIN_PASS }}
            fi
            security unlock-keychain -p $RABBY_MOBILE_UNLOCK_KEYCHAIN_PASS login.keychain
            # cd ios && bundle install && bundle exec pod install --deployment;
            # cd ../;
            ./scripts/deploy-ios-adhoc.sh

            # # cleanup packager
            # ps axo pid,command | grep -E 'launchPackager\.command' | grep -v grep | awk '{print $1}' | xargs kill -9; > /dev/null 2>&1
          fi

        env:
          KEYCHAIN_PASS: ${{ secrets.KEYCHAIN_PASS }}
          RABBY_MOBILE_BUILD_BUCKET: ${{ secrets.RABBY_MOBILE_BUILD_BUCKET }}
          RABBY_MOBILE_KR_PWD: ${{ secrets.RABBY_MOBILE_KR_PWD }}
          RABBY_MOBILE_SAFE_API_KEY: ${{ secrets.MOBILE_SAFE_API_KEY }}
          RABBY_MOBILE_CODE: ${{ secrets.RABBY_MOBILE_CODE2 }}
          RABBY_MOBILE_ANDROID_KEY_STORE: ${{ secrets.RABBY_MOBILE_ANDROID_KEY_STORE }}
          RABBY_MOBILE_ANDROID_STORE_PASSWORD: ${{ secrets.RABBY_MOBILE_ANDROID_STORE_PASSWORD }}
          RABBY_MOBILE_ANDROID_KEY_PASSWORD: ${{ secrets.RABBY_MOBILE_ANDROID_KEY_PASSWORD }}
          RABBY_MOBILE_ANDROID_KEY_ALIAS: ${{ secrets.RABBY_MOBILE_ANDROID_KEY_ALIAS }}
          RABBY_MOBILE_SENTRY_AUTH_TOKEN2: ${{ secrets.RABBY_MOBILE_SENTRY_AUTH_TOKEN2 }}
          RABBY_MOBILE_FE_SERVICE_URL: ${{ vars.RABBY_MOBILE_FE_SERVICE_URL || vars.RABBY_MOBILE_PUSH_TEST_SERVER_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.RABBY_MOBILE_SENTRY_AUTH_TOKEN2 }}
          MATCH_PASSWORD: ${{ secrets.RABBY_MOBILE_MATCH_PASSWORD }}
          INPUT_MOBILE_LOC: ${{ inputs.macos_machine_location }}
          REALLY_UPLOAD: ${{ inputs.REALLY_UPLOAD }}
          SENTRY_DISABLE_AUTO_UPLOAD: ${{ inputs.SENTRY_DISABLE_AUTO_UPLOAD }}
          GITHUB_ACTIONS_RUNNER_TLS_NO_VERIFY: ${{ inputs.__DANGEROUS_NO_VERIFY_SSL && '1' || '0' }}
          DISABLE_AWS_CLI_HTTPS_VALIDATION: ${{ inputs.__DANGEROUS_NO_VERIFY_SSL }}
          GHA_MOCK_BUILD_FAILED: ${{ inputs.GHA_MOCK_BUILD_FAILED }}
          CONFIGURATION: release
          TYPE: adhoc
          RABBY_MOBILE_BUILD_ENV: regression
          RABBY_MOBILE_ANDROID_FAST_BUILD: ${{ inputs.FAST_BUILD_ON_ANDROID }}
          RABBY_MOBILE_IOS_FAST_BUILD: ${{ inputs.FAST_BUILD_ON_IOS }}
          SKIP_NOTIFY_LARK: ${{ inputs.SKIP_NOTIFY_LARK }}
          RABBY_MOBILE_LARK_CHAT_URL: ${{ secrets.LARK_CHAT_URL }}
          RABBY_MOBILE_LARK_CHAT_SECRET: ${{ secrets.LARK_CHAT_SECRET }}
          RABBY_ROBOT_LARK_APP_ID: ${{ secrets.RABBY_ROBOT_LARK_APP_ID }}
          RABBY_ROBOT_LARK_APP_SECRET: ${{ secrets.RABBY_ROBOT_LARK_APP_SECRET }}
          # see more details on https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
          GIT_ACTIONS_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GIT_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_REF_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_NEW_VERSION_NAME: ${{ inputs.NEW_VERSION_NAME }}

      # - name: Upload artifact
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: rabbymobile-${{ steps.actionvars.outputs.flatten_refname }}-${{ steps.actionvars.outputs.trigger_date }}
      #     path: |
      #       ./apps/mobile/android/app/build/outputs/apk/regression/release/app-regression-release.apk
      #       ./apps/mobile/ios/Package/adhoc/*.ipa
      #       ./apps/mobile/ios/Package/adhoc/manifest.plist
      #       ./apps/mobile/ios/Package/adhoc/*.zip
      #     retention-days: 7
