name: Build and deploy Android Release
on:
  push:
    tags:
      - 'android-release-*'
    branches:
      - 'ci/android-release-*'
      - ci/universal-release-*
  workflow_dispatch:
    inputs:
      buildchannel:
        description: 'Build Channel'
        required: true
        default: 'appstore'
        type: choice
        options:
          - selfhost
          - appstore
      REALLY_UPLOAD:
        required: true
        type: boolean
        default: true
      UPLOAD_TO_GOOGLE_PLAY_INTERNAL:
        description: 'Upload the appstore AAB to Google Play internal track as a draft release'
        required: true
        type: boolean
        default: false
      HASH_CHECK:
        description: 'Build in deterministic release hash-check mode without upload'
        required: false
        type: boolean
        default: false
      HASH_CHECK_GIT_HASH:
        description: 'Optional git hash injected into HASH_CHECK bundle metadata'
        required: false
        type: string
        default: ''
      HASH_CHECK_GIT_TIME:
        description: 'Optional git time injected into HASH_CHECK bundle metadata'
        required: false
        type: string
        default: ''
  workflow_call:
    secrets:
      RABBY_MOBILE_ANDROID_KEY_STORE:
        required: true
      RABBY_MOBILE_ANDROID_STORE_PASSWORD:
        required: true
      RABBY_MOBILE_ANDROID_KEY_PASSWORD:
        required: true
      RABBY_MOBILE_ANDROID_KEY_ALIAS:
        required: true
      RABBY_MOBILE_KR_PWD:
        required: true

defaults:
  run:
    shell: bash -ieol pipefail {0}
env:
  BUILD_TARGET_PLATFORM: android
  ANDROID_NDK_VERSION: '27.3.13750724'

jobs:
  release-build:
    name: android-release-build
    environment: Production
    runs-on:
      - self-hosted
      - mobile
      - Linux
    env:
      RABBY_MOBILE_NM_USE_CACHE: 'true'
      RABBY_MOBILE_METRO_NODE_MAX_OLD_SPACE_SIZE: '6144'
      RABBY_MOBILE_METRO_MAX_WORKERS: '4'
      HASH_CHECK: ${{ (github.event_name == 'workflow_dispatch' && inputs.HASH_CHECK) || startsWith(github.ref_name, 'ci/android-release-hash-check-') || false }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          clean: false

      - name: Clean git Manually
        run: |
          yarn_exclude_args=()
          if [ "$RABBY_MOBILE_NM_USE_CACHE" = "true" ]; then
            echo "Keep yarn install outputs";
            yarn_exclude_args+=(
              -e node_modules
              -e 'apps/*/node_modules'
              -e 'packages/*/node_modules'
              -e apps/mobile/.bundle
              -e apps/mobile/vendor/bundle
              -e .yarn/install-state.gz
              -e .yarn/unplugged
            )
          fi

          git clean -ffdx "${yarn_exclude_args[@]}";
          git reset --hard HEAD;

      - name: Get Actions Variables
        id: actionvars
        run: |
          trigger_date=$(date +'%Y%m%d%H%M%S')
          echo "trigger_date=$trigger_date" >> "$GITHUB_OUTPUT"

          flatten_refname=${GITHUB_REF_NAME//\//'_'}
          flatten_refname=${flatten_refname//\./'_'}
          echo "flatten_refname=$flatten_refname" >> "$GITHUB_OUTPUT"

      - name: '[Android] Setup Nodejs and Yarn'
        if: runner.os == 'Linux'
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: '[Android] Setup Ruby & Fastlane'
        if: runner.os == 'Linux'
        uses: heisenberg-2077/setup-ruby@ad02358aa4017fc234098879ef04707472008690 # master
        with:
          ruby-version: '3.3.6'
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Setup Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@7c5672355aaa8fde5f97a91aa9a99616d1ace6bc # v2

      - name: Setup Android NDK for HASH_CHECK
        if: ${{ env.HASH_CHECK == 'true' }}
        run: |
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          ndk_root="$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}"
          if [ ! -d "$ndk_root" ]; then
            ndk_root="$(find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | LC_ALL=C sort | tail -n 1)"
          fi
          if [ -z "$ndk_root" ] || [ ! -d "$ndk_root" ]; then
            echo "Android NDK not found under $ANDROID_HOME/ndk" >&2
            exit 1
          fi
          llvm_strip_path="$(find "$ndk_root" -path '*/toolchains/llvm/prebuilt/*/bin/llvm-strip' \( -type f -o -type l \) 2>/dev/null | LC_ALL=C sort | tail -n 1)"
          if [ -z "$llvm_strip_path" ] || [ ! -x "$llvm_strip_path" ]; then
            echo "llvm-strip not found under $ndk_root" >&2
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_root" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_root" >> "$GITHUB_ENV"
          echo "RABBY_MOBILE_ANDROID_LLVM_STRIP=$llvm_strip_path" >> "$GITHUB_ENV"

      - name: Install & Build app
        run: |
          cd apps/mobile;

          [ -z $buildchannel ] && export buildchannel=appstore;
          [ -z "${REALLY_UPLOAD:-}" ] && export REALLY_UPLOAD=true;
          if [ "$HASH_CHECK" = "true" ]; then
            bash ./scripts/release-hash-check.sh android
          else
            RABBY_MOBILE_RUN_POSTINSTALL=true bash ./scripts/ci/prepare-mobile-build.sh;
            bundle install;
            ./scripts/deploy-android.sh
          fi
        env:
          FLATTEN_REFNAME: ${{ steps.actionvars.outputs.flatten_refname }}
          TRIGGER_DATE: ${{ steps.actionvars.outputs.trigger_date }}
          RABBY_MOBILE_BUILD_BUCKET: ${{ secrets.RABBY_MOBILE_BUILD_BUCKET }}
          RABBY_MOBILE_KR_PWD: ${{ secrets.RABBY_MOBILE_KR_PWD }}
          RABBY_MOBILE_CODE: ${{ secrets.RABBY_MOBILE_CODE2 }}
          RABBY_MOBILE_ANDROID_KEY_STORE: ${{ secrets.RABBY_MOBILE_ANDROID_KEY_STORE }}
          RABBY_MOBILE_ANDROID_STORE_PASSWORD: ${{ secrets.RABBY_MOBILE_ANDROID_STORE_PASSWORD }}
          RABBY_MOBILE_ANDROID_KEY_PASSWORD: ${{ secrets.RABBY_MOBILE_ANDROID_KEY_PASSWORD }}
          RABBY_MOBILE_ANDROID_KEY_ALIAS: ${{ secrets.RABBY_MOBILE_ANDROID_KEY_ALIAS }}
          RABBY_MOBILE_SENTRY_AUTH_TOKEN2: ${{ secrets.RABBY_MOBILE_SENTRY_AUTH_TOKEN2 }}
          SENTRY_AUTH_TOKEN: ${{ secrets.RABBY_MOBILE_SENTRY_AUTH_TOKEN2 }}
          MATCH_PASSWORD: ${{ secrets.RABBY_MOBILE_MATCH_PASSWORD }}
          RABBY_MOBILE_LARK_CHAT_URL: ${{ secrets.LARK_CHAT_URL }}
          RABBY_MOBILE_LARK_CHAT_SECRET: ${{ secrets.LARK_CHAT_SECRET }}
          RABBY_ROBOT_LARK_APP_ID: ${{ secrets.RABBY_ROBOT_LARK_APP_ID }}
          RABBY_ROBOT_LARK_APP_SECRET: ${{ secrets.RABBY_ROBOT_LARK_APP_SECRET }}
          RABBY_MOBILE_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.RABBY_MOBILE_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          buildchannel: ${{ inputs.buildchannel }}
          REALLY_UPLOAD: ${{ inputs.REALLY_UPLOAD }}
          RABBY_MOBILE_HASHCHECK_INJECTED_GIT_HASH: ${{ github.event_name == 'workflow_dispatch' && inputs.HASH_CHECK_GIT_HASH || '' }}
          RABBY_MOBILE_HASHCHECK_INJECTED_GIT_TIME: ${{ github.event_name == 'workflow_dispatch' && inputs.HASH_CHECK_GIT_TIME || '' }}
          # see more details on https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
          GIT_ACTIONS_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GIT_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_REF_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}

      - name: Upload HASH_CHECK artifact
        if: ${{ env.HASH_CHECK == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-hash-check
          path: apps/mobile/release_hash_check_exports_*
          retention-days: 7

      - name: Upload appstore AAB to Google Play internal track
        if: ${{ inputs.buildchannel == 'appstore' && inputs.REALLY_UPLOAD && inputs.UPLOAD_TO_GOOGLE_PLAY_INTERNAL && !inputs.HASH_CHECK }}
        run: |
          cd apps/mobile;
          bash ./scripts/ci/upload-google-play-internal-track.sh
        env:
          RABBY_MOBILE_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.RABBY_MOBILE_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          RABBY_MOBILE_LARK_CHAT_URL: ${{ secrets.LARK_CHAT_URL }}
          RABBY_MOBILE_LARK_CHAT_SECRET: ${{ secrets.LARK_CHAT_SECRET }}
          GIT_ACTIONS_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GIT_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          GIT_REF_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}

      # - name: Upload artifact
      #   uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
      #   with:
      #     name: rabbymobile-${{ steps.actionvars.outputs.flatten_refname }}-${{ steps.actionvars.outputs.trigger_date }}
      #     path: |
      #       ./apps/mobile/android/app/build/outputs/apk/release/app-release.apk
      #     retention-days: 7
