appId: ${RABBY_MAESTRO_APP_ID}
name: Android ensure Home is ready
tags:
  - android
  - maestro
  - bootstrap
  - home
env:
  WELCOME_IMPORT_EXISTING_ID: e2e.onboarding.welcome.import-existing
  UNLOCK_PASSWORD_INPUT_ID: e2e.unlock.password.input
  SINGLE_HOME_BACK_ID: e2e.home.single-address.back
  HOME_ADD_ADDRESS_BUTTON_ID: e2e.home.add-address.button
---
- retry:
    maxRetries: 2
    commands:
      - runFlow:
          when:
            visible:
              id: ${WELCOME_IMPORT_EXISTING_ID}
          file: android-onboarding-import-private-key.yaml

      - runFlow:
          when:
            visible:
              id: ${UNLOCK_PASSWORD_INPUT_ID}
          file: android-unlock.yaml

      - runFlow:
          when:
            visible:
              id: ${SINGLE_HOME_BACK_ID}
          file: android-single-home-back-to-home.yaml

      - runFlow:
          file: shared-dismiss-debug-warnings-overlay.yaml

      - extendedWaitUntil:
          visible:
            id: ${HOME_ADD_ADDRESS_BUTTON_ID}
          timeout: 8000

- assertVisible:
    id: ${HOME_ADD_ADDRESS_BUTTON_ID}
